name: images
on:
  push:
    branches: [main]
    paths:
      - "operator/**"
      - "training/**"
      - "serving/**"
      - "components/fake-dcgm-exporter/**"

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: ml-operator
            context: operator
          - name: trainer
            context: training
          - name: mnist-server
            context: serving/runtime
          - name: fake-dcgm-exporter
            context: components/fake-dcgm-exporter
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/fyp-${{ matrix.name }}:latest
            ghcr.io/${{ github.repository_owner }}/fyp-${{ matrix.name }}:${{ github.sha }}
