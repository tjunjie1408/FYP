name: operator-ci
on:
  push:
    paths: ["operator/**", ".github/workflows/operator-ci.yaml"]
  pull_request:
    paths: ["operator/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: operator/go.sum
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test (unit + envtest)
        # The Makefile's `test` target downloads envtest binaries via
        # setup-envtest and runs the full suite.
        run: make test
