# Applied by scripts/demo.sh once the mnist-demo model is in MinIO.
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: mnist-demo
  namespace: models
  annotations:
    autoscaling.knative.dev/min-scale: "0" # scale-to-zero
    autoscaling.knative.dev/window: "60s" # short idle window for the demo
spec:
  predictor:
    # Propagated to predictor pods: the fake DCGM exporter assigns this pod a
    # simulated GPU while it runs and releases it on scale-to-zero — this is
    # what makes the inference half of the cost report (fyp_gpu_assigned)
    # respond to Knative autoscaling.
    labels:
      gpu.fyp/simulated: "true"
    serviceAccountName: kserve-s3-sa
    containers:
      - name: kserve-container
        image: ghcr.io/tjunjie1408/fyp-mnist-server:latest # local dev: fyp/mnist-server:dev
        env:
          - name: STORAGE_URI
            value: s3://models/training/mnist-demo/
          - name: MODEL_NAME
            value: mnist-demo
        resources:
          requests: { cpu: 250m, memory: 512Mi }
          limits: { memory: 1Gi }
