# KServe reads these annotations to configure the S3 (MinIO) storage client
# for the storage-initializer. Sharp edge (M5 risk #3): endpoint has NO
# scheme, s3-usehttps=0 forces plain HTTP. A wrong value here makes the
# storage-initializer init container hang. Keep this working YAML in the repo.
apiVersion: v1
kind: Secret
metadata:
  name: kserve-s3-secret
  namespace: models
  annotations:
    serving.kserve.io/s3-endpoint: minio.minio.svc.cluster.local:9000
    serving.kserve.io/s3-usehttps: "0"
    serving.kserve.io/s3-region: us-east-1
    serving.kserve.io/s3-useanoncredential: "false"
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
