# Demo credentials — fine for a throwaway local cluster, never for real infra.
# The same Secret exists in training (trainer upload) and models (KServe
# storage-initializer) because Secrets are namespace-scoped.
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: minio
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: training
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: models
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
