# DNS to kube-dns, with L7 DNS visibility (hubble shows queried names —
# demo screenshot material).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: training-allow-dns
  namespace: training
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
