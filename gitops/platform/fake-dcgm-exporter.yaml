apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fake-dcgm-exporter
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4" # ServiceMonitor CRD exists from wave 1
spec:
  project: platform
  source:
    repoURL: https://github.com/tjunjie1408/FYP
    targetRevision: HEAD
    path: charts/fake-dcgm-exporter
    helm:
      valuesObject:
        image:
          repository: ghcr.io/tjunjie1408/fyp-fake-dcgm-exporter
          tag: latest
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    retry:
      limit: 10
      backoff: { duration: 15s, factor: 2, maxDuration: 5m }
