apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    # Wave 1, deliberately early: its CRDs (ServiceMonitor/PodMonitor) must
    # exist before later apps that ship ServiceMonitors sync clean.
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: platform
  sources:
    # ServerSideApply is mandatory: the prometheus CRDs blow the 262KB
    # client-side-apply annotation limit.
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 86.0.0
      helm:
        valueFiles:
          - $values/gitops/values/kube-prometheus-stack.yaml
    - repoURL: https://github.com/tjunjie1408/FYP
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
    retry:
      limit: 10
      backoff: { duration: 15s, factor: 2, maxDuration: 5m }
