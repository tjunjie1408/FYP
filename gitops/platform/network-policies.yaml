apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: network-policies
  namespace: argocd
  annotations:
    # Wave 4: enforce only after the platform is healthy. Debug with
    # `hubble observe --verdict DROPPED` (see docs/runbook.md).
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: platform
  source:
    repoURL: https://github.com/tjunjie1408/FYP
    targetRevision: HEAD
    path: gitops/components/network-policies
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    retry:
      limit: 10
      backoff: { duration: 15s, factor: 2, maxDuration: 5m }
