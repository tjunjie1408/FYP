---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: trainingjobs.mlplatform.fyp.io
spec:
  group: mlplatform.fyp.io
  names:
    kind: TrainingJob
    listKind: TrainingJobList
    plural: trainingjobs
    singular: trainingjob
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.gpus
      name: GPUs
      type: integer
    - jsonPath: .status.attempts
      name: Attempts
      type: integer
    - jsonPath: .status.modelURI
      name: Model
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: TrainingJob is the Schema for the trainingjobs API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec is immutable after creation (validated by CEL instead
              of a webhook).
            properties:
              dataset:
                description: DatasetSpec selects the dataset the trainer downloads.
                properties:
                  name:
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              gpus:
                default: 1
                description: GPUs requested; counted against the namespace GPUQuota
                  (simulated GPUs).
                format: int32
                minimum: 0
                type: integer
              hyperparameters:
                additionalProperties:
                  type: string
                description: |-
                  Hyperparameters are passed through as workflow parameters.
                  Recognized keys: epochs, batchSize, learningRate.
                type: object
              model:
                description: ModelSpec selects which model architecture the trainer
                  builds.
                properties:
                  name:
                    enum:
                    - mnist-cnn
                    - cifar10-cnn
                    type: string
                required:
                - name
                type: object
              output:
                description: OutputSpec describes where the trained model artifact
                  is stored.
                properties:
                  bucket:
                    description: |-
                      Bucket is the S3 (MinIO) bucket. The object key is conventional:
                      <namespace>/<name>/model.pt
                    minLength: 1
                    type: string
                required:
                - bucket
                type: object
              retry:
                description: |-
                  RetrySpec controls operator-level re-submission of failed workflows.
                  This is independent of Argo's per-step retryStrategy: the operator reacts
                  only to terminal Workflow phases and never consumes backoffLimit on
                  internal step retries.
                properties:
                  backoffLimit:
                    default: 0
                    description: |-
                      BackoffLimit is the number of workflow re-submissions after the first
                      attempt fails. Total attempts = backoffLimit + 1.
                    format: int32
                    minimum: 0
                    type: integer
                type: object
              ttlSecondsAfterFinished:
                description: |-
                  TTLSecondsAfterFinished: the operator deletes this TrainingJob (and its
                  owned Workflows) this many seconds after it reaches a terminal phase.
                format: int32
                minimum: 0
                type: integer
            required:
            - dataset
            - model
            - output
            type: object
            x-kubernetes-validations:
            - message: spec is immutable
              rule: self == oldSelf
          status:
            description: TrainingJobStatus defines the observed state of a TrainingJob.
            properties:
              attempts:
                description: |-
                  Attempts counts Workflows created for this job. It is incremented in
                  exactly one place: when the operator creates a new Workflow object.
                format: int32
                type: integer
              completionTime:
                format: date-time
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              modelURI:
                description: ModelURI is set on success, e.g. s3://models/training/mnist-demo/
                type: string
              phase:
                description: TrainingJobPhase describes the lifecycle phase of a TrainingJob.
                enum:
                - Pending
                - Queued
                - Running
                - Succeeded
                - Failed
                type: string
              startTime:
                format: date-time
                type: string
              workflowName:
                description: WorkflowName of the current attempt.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
