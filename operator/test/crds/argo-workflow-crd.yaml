# Minimal Argo Workflow CRD vendored for envtest ONLY.
# envtest has no Argo controller — exactly what the operator tests want:
# the suite creates TrainingJobs, asserts Workflows appear, then hand-patches
# Workflow status.phase to drive the TrainingJob state machine.
# Schema is intentionally open (preserve-unknown-fields), matching Argo's
# real CRD, which also has no status subresource.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workflows.argoproj.io
spec:
  group: argoproj.io
  names:
    kind: Workflow
    listKind: WorkflowList
    plural: workflows
    singular: workflow
    shortNames:
      - wf
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
