# Argo CD trimmed for a laptop: single replicas, no dex/notifications.
dex:
  enabled: false
notifications:
  enabled: false

controller:
  replicas: 1
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { memory: 768Mi }

server:
  replicas: 1
  # --insecure: TLS terminates at the port-forward; fine for a local demo.
  extraArgs:
    - --insecure
  resources:
    requests: { cpu: 25m, memory: 64Mi }
    limits: { memory: 256Mi }

repoServer:
  replicas: 1
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { memory: 512Mi }

applicationSet:
  replicas: 1
  resources:
    requests: { cpu: 10m, memory: 64Mi }
    limits: { memory: 128Mi }

redis:
  resources:
    requests: { cpu: 25m, memory: 64Mi }
    limits: { memory: 128Mi }
